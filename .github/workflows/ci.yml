name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://test:test@localhost:5432/testdb
      JWT_SECRET: ci_secret_com_pelo_menos_32_caracteres_aqui_ok
      NODE_ENV: test
      FRONTEND_URL: http://localhost:5173
      DB_SSL: "false"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Testes unitários
        run: npm run test:unit

      - name: Aplicar migrations no banco de teste
        run: npx drizzle-kit migrate

      - name: Testes de integração
        run: node --test --test-concurrency=1 'tests/**/*.test.ts'

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck e build
        run: npm run build
