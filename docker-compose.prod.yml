services:
  caddy:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://ensinadev.com.br/api
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    expose:
      - "3001"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Executor isolado dos desafios de código. É o único serviço com acesso ao
  # Docker: sobe um container efêmero por submissão. O backend fala com ele pela
  # rede interna (RUNNER_URL padrão http://runner:8080). As imagens de execução
  # desafio-js/desafio-python precisam existir no host (rode runner/build-images.sh).
  runner:
    build:
      context: ./runner
    restart: unless-stopped
    environment:
      - MAX_CONCURRENT=2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  uploads:
